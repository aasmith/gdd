<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Event Log — GDD Garden Planner</title>
  <link rel="stylesheet" href="/style.css">
  <style>
    main.log-main {
      display: block;
      height: calc(100vh - 48px);
      overflow: auto;
      padding: 16px;
    }

    .log-controls {
      display: flex;
      gap: 12px;
      align-items: center;
      margin-bottom: 16px;
      font-size: 13px;
    }

    .log-controls label { color: #666; }

    .log-controls select {
      padding: 4px 6px;
      border: 1px solid #ccc;
      border-radius: 3px;
      font-size: 13px;
    }

    .log-info {
      font-size: 12px;
      color: #888;
      margin-bottom: 12px;
    }

    .log-list {
      list-style: none;
    }

    .log-entry {
      display: flex;
      gap: 12px;
      padding: 8px 0;
      border-bottom: 1px solid #f0f0f0;
      font-size: 13px;
    }

    .log-entry:last-child { border-bottom: none; }

    .log-time {
      color: #999;
      font-size: 11px;
      white-space: nowrap;
      min-width: 140px;
      font-variant-numeric: tabular-nums;
    }

    .log-badge {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      padding: 2px 6px;
      border-radius: 3px;
      white-space: nowrap;
    }

    .log-badge.created { background: #e8f5e0; color: #2d5016; }
    .log-badge.updated { background: #e8eef5; color: #4a6fa5; }
    .log-badge.deleted { background: #fde8e8; color: #c0392b; }

    .log-sheet {
      color: #888;
      font-size: 11px;
      white-space: nowrap;
    }

    .log-body {
      flex: 1;
    }

    .log-crop {
      font-weight: 500;
    }

    .log-changes {
      font-size: 11px;
      color: #666;
      margin-top: 2px;
    }

    .log-change-item {
      display: inline;
    }

    .log-change-item + .log-change-item::before {
      content: " \00b7 ";
      color: #ccc;
    }

    .log-from { color: #999; text-decoration: line-through; }
    .log-to { color: #333; }
  </style>
</head>
<body>
  <header>
    <h1>GDD Garden Planner</h1>
    <div class="header-controls">
      <a href="#" onclick="history.back(); return false;" class="header-btn">&#9664; Back</a>
    </div>
  </header>
  <main class="log-main">
    <div class="log-controls">
      <label>Filter:
        <select id="log-filter">
          <option value="all">All sheets</option>
        </select>
      </label>
    </div>
    <div class="log-info" id="log-info"></div>
    <ul class="log-list" id="log-list"></ul>
  </main>
  <script>
    const filterSelect = document.getElementById("log-filter");
    const logList = document.getElementById("log-list");
    const logInfo = document.getElementById("log-info");

    let sheets = [];
    let events = [];

    async function init() {
      const resp = await fetch("/api/sheets");
      sheets = await resp.json();

      // Build filter options: all, by year, by sheet
      const years = [...new Set(sheets.map(s => s.year))].sort((a, b) => b - a);

      years.forEach(yr => {
        const optYear = document.createElement("option");
        optYear.value = `year:${yr}`;
        optYear.textContent = `All ${yr}`;
        filterSelect.appendChild(optYear);

        sheets.filter(s => s.year === yr).forEach(s => {
          const opt = document.createElement("option");
          opt.value = `sheet:${s.id}`;
          opt.textContent = `  ${yr} / ${s.name}`;
          filterSelect.appendChild(opt);
        });
      });

      filterSelect.addEventListener("change", loadEvents);
      await loadEvents();
    }

    async function loadEvents() {
      const val = filterSelect.value;
      let url = "/api/events";
      if (val.startsWith("year:")) url += `?year=${val.split(":")[1]}`;
      else if (val.startsWith("sheet:")) url += `?sheet_id=${val.split(":")[1]}`;

      const resp = await fetch(url);
      events = await resp.json();
      render();
    }

    function render() {
      logList.innerHTML = "";

      if (!events.length) {
        logInfo.textContent = "No events recorded yet.";
        return;
      }

      logInfo.textContent = `${events.length} events`;

      events.forEach(ev => {
        const li = document.createElement("li");
        li.className = "log-entry";

        const details = ev.details ? JSON.parse(ev.details) : {};
        const time = new Date(ev.created_at + "Z");
        const timeStr = time.toLocaleDateString() + " " + time.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });

        let bodyHtml = `<span class="log-crop">${details.crop || "Unknown"}</span>`;

        if (ev.action === "created") {
          bodyHtml += ` planted ${details.plant_date || ""}`;
        } else if (ev.action === "deleted") {
          bodyHtml += ` removed (was ${details.plant_date || ""})`;
        } else if (ev.action === "updated" && details.changes) {
          const changeItems = Object.entries(details.changes).map(([k, v]) => {
            const label = k.replace(/_/g, " ");
            if (v.from && v.to) {
              return `<span class="log-change-item">${label}: <span class="log-from">${v.from}</span> \u2192 <span class="log-to">${v.to}</span></span>`;
            }
            return `<span class="log-change-item">${label}: <span class="log-to">${v.to}</span></span>`;
          }).join("");
          bodyHtml += `<div class="log-changes">${changeItems}</div>`;
        }

        const sheetLabel = ev.sheet_name ? `${ev.sheet_year} / ${ev.sheet_name}` : "";

        li.innerHTML = `
          <span class="log-time">${timeStr}</span>
          <span class="log-badge ${ev.action}">${ev.action}</span>
          <span class="log-sheet">${sheetLabel}</span>
          <div class="log-body">${bodyHtml}</div>
        `;

        logList.appendChild(li);
      });
    }

    init();
  </script>
</body>
</html>
