<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GDD Garden Planner</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <header>
    <h1>GDD Garden Planner</h1>
    <button id="options-btn" title="Options">&#9881;</button>
  </header>
  <div id="options-panel" class="hidden">
    <h3>Options</h3>
    <div class="option-row">
      <label for="opt-season-start">Season start</label>
      <input type="text" id="opt-season-start" placeholder="MM-DD" size="5">
    </div>
    <div class="option-row">
      <label for="opt-season-end">Season end</label>
      <input type="text" id="opt-season-end" placeholder="MM-DD" size="5">
    </div>
    <div class="option-row">
      <label for="opt-week-day">Weekly grid lines</label>
      <select id="opt-week-day">
        <option value="0">Sunday</option>
        <option value="1">Monday</option>
        <option value="2">Tuesday</option>
        <option value="3">Wednesday</option>
        <option value="4">Thursday</option>
        <option value="5">Friday</option>
        <option value="6">Saturday</option>
      </select>
    </div>
    <button id="options-save" class="options-save-btn">Save</button>
  </div>
  <main>
    <aside id="sidebar">
      <div id="sidebar-section-methods">
        <h2>GDD Methods</h2>
        <div id="method-list"></div>
        <button id="add-method-btn" class="sidebar-add-btn">+ Add Method</button>
      </div>
      <hr class="sidebar-divider">
      <div id="sidebar-section-crops">
        <h2>Crops</h2>
        <div id="crop-list"></div>
        <button id="add-crop-btn" class="sidebar-add-btn">+ Add Crop</button>
      </div>
    </aside>
    <section id="timeline"></section>
  </main>
  <div id="detail-panel" class="hidden"></div>

  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script src="/api.js"></script>
  <script src="/gdd.js"></script>
  <script src="/sidebar.js"></script>
  <script src="/timeline.js"></script>
  <script src="/detail.js"></script>
  <script src="/app.js"></script>
</body>
</html>
